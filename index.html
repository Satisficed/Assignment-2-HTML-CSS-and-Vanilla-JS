<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cubic Solver</title>
    <link rel="stylesheet" href="style.css">
  </head> 

  <body>
    <div class="container">
      <h1><i> Cubic Solver </i></h1>
      <form id="cube-form">
        <label for="a"> a-value: </label>
        <input type="number" id="a" name="a" required />
        <label for="b"> b-value: </label>
        <input type="number" id="b" name="b" required /> 
        <label for="c"> c-value: </label>
        <input type="number" id="c" name="c" required /> 
        <label for="d"> d-value: </label>
        <input type="number" id="d" name="d" required /> 
        <input type="submit" value="Calculate Cubic" />
        <label id="result" name="result"> Result: </label>
        <input type="text" id="result" name="result" />
      </form>
    </div>
    <script src="main.ts"></script>
  </body>

  

</html>
