<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Cubic Solver</title>
    <link rel="stylesheet" href="style.css">
  </head> 

  <body>

    <div class="container">
      <h1><i> Cubic Solver </i></h1>
      <form id="cube-form">
        <label for="a"> a-value: </label>
        <input type="number" id="a" name="a" required />
        <label for="b"> b-value: </label>
        <input type="number" id="b" name="b" required /> 
        <label for="c"> c-value: </label>
        <input type="number" id="c" name="c" required /> 
        <label for="d"> d-value: </label>
        <input type="number" id="d" name="d" required /> 
        <button type="submit"> Calculate Cubic</button>
        <label for="result">Result: </label>
        <input type="result" id="result" readonly>
      </form>
    </div>

    <div class="table">
      <table>
        <th>
          <tr>
            <th>p</th>
            <td>blank</td>
          </tr>
        </th>
        <th>
          <tr>
            <th>q</th>
            <td>blank</td>
          </tr>
        </th>
        <th>
          <tr>
            <th>Value</th>
            <th>x</th>
            <th>y</th>
          </tr>
        </th>
        <th>
          <tr>
            <th>Root 1</th>
            <td>0</td>
            <td>0</td>
          </tr>
        </th>
        <th>
          <tr>
            <th>Root 2</th>
            <td>0</td>
            <td>0</td>
          </tr>
        </th>
        <th>
          <tr>
            <th>Root 3</th>
            <td>0</td>
            <td>0</td>
          </tr>
        </th>
      </table>
    </div>
    
    <script src="main.ts"></script>
  </body>
</html>
